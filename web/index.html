<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estimator Paleti — Comandat</title>
<style>
  :root {
    --green: #188038; --green-bg: #e6f4ea;
    --yellow: #b06000; --yellow-bg: #fef7e0;
    --red: #c5221f; --red-bg: #fce8e6;
    --blue: #1a73e8; --blue-bg: #e8f0fe;
    --gray: #5f6368; --line: #e0e0e0;
    --surface: #fff; --page: #f0f2f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background: var(--page); color: #202124; font-size: 14px; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--line);
    padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  h1 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
  .spacer { flex: 1; }
  .meta { font-size: 12px; color: var(--gray); white-space: nowrap; }

  .btn { border: none; padding: 9px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity .15s; }
  .btn:disabled { opacity: .55; cursor: default; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-secondary { background: #f1f3f4; color: #3c4043; }
  .btn:not(:disabled):hover { opacity: .88; }

  .wrap { padding: 20px 24px; }

  .card {
    background: var(--surface); border-radius: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
    overflow: clip; /* clip without creating a scroll container — keeps th sticky working */
  }

  .tabs {
    display: flex; border-bottom: 1px solid var(--line); background: #f8f9fa;
  }
  .tab {
    padding: 11px 20px; border: none; background: none; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--gray);
    border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap;
  }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); background: var(--surface); }
  .tab:hover:not(.active) { color: #3c4043; background: #f0f2f5; }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px; color: var(--gray);
    background: #f8f9fa; border-bottom: 1px solid var(--line);
    position: sticky; top: var(--head-h, 57px); z-index: 5;
  }
  td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbff; }

  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.img-cell { width: 56px; padding: 8px 8px 8px 14px; }
  td.title-cell { white-space: normal; max-width: 320px; }

  .pallet-img {
    width: 44px; height: 44px; object-fit: contain; border-radius: 6px;
    background: #f1f3f4; display: block; border: 1px solid var(--line);
  }
  .img-placeholder {
    width: 44px; height: 44px; border-radius: 6px; background: #f1f3f4;
    border: 1px solid var(--line); display: flex; align-items: center;
    justify-content: center; font-size: 18px; color: #bbb;
  }

  .pallet-title { font-weight: 600; font-size: 13px; line-height: 1.35; }
  .pallet-sku { font-size: 11px; color: var(--gray); margin-top: 2px; font-family: 'Courier New', monospace; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .tag-green  { background: var(--green-bg);  color: var(--green); }
  .tag-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .tag-red    { background: var(--red-bg);    color: var(--red); }
  .tag-blue   { background: var(--blue-bg);   color: var(--blue); }
  .tag-gray   { background: #f1f3f4;          color: var(--gray); }

  .row-green td:first-child { border-left: 3px solid var(--green); }
  .row-yellow td:first-child { border-left: 3px solid var(--yellow); }
  .row-red td:first-child { border-left: 3px solid var(--red); }
  .row-gray td:first-child { border-left: 3px solid #d0d0d0; }

  .bid-green  { color: var(--green);  font-weight: 700; }
  .bid-yellow { color: var(--yellow); font-weight: 700; }
  .bid-red    { color: var(--red);    font-weight: 700; }
  .muted { color: var(--gray); }

  .empty { text-align: center; padding: 60px 24px; color: var(--gray); }
  .empty p { margin-top: 8px; font-size: 13px; }
  #tip {
    display: none; position: fixed; z-index: 9999; pointer-events: none;
    background: #202124; color: #fff; padding: 8px 12px; border-radius: 6px;
    font-size: 12px; max-width: 420px; word-break: break-word; line-height: 1.5;
    box-shadow: 0 3px 10px rgba(0,0,0,.35);
  }
  .btn-est {
    margin-left: 6px; padding: 2px 9px; font-size: 11px; font-weight: 600;
    background: var(--blue); color: #fff; border: none; border-radius: 4px;
    cursor: pointer; vertical-align: middle;
  }
  .btn-est:hover { opacity: .85; }
  .spinner {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid currentColor; border-top-color: transparent;
    animation: spin .6s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
    background: var(--blue-bg); color: var(--blue);
  }
</style>
</head>
<body>

<header>
  <h1>📦 Estimator Paleti</h1>
  <span class="meta" id="summary">Se încarcă…</span>
  <span class="spacer"></span>
  <button class="btn btn-secondary" onclick="refresh()">Reîncarcă lista</button>
  <button class="btn btn-primary" id="estimate-btn" onclick="estimate()">Estimează paleții de mâine</button>
</header>

<div id="tip"></div>
<div class="wrap">
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-tomorrow" onclick="setTab('tomorrow')">Licitații de mâine</button>
      <button class="tab" id="tab-today" onclick="setTab('today')">Licitații de azi</button>
    </div>
    <div id="empty" class="empty" style="display:none">
      <div style="font-size:32px">📭</div>
      <p>Niciun palet pentru această zi. Apasă <b>Reîncarcă lista</b> pentru a verifica.</p>
    </div>
    <table id="tbl" style="display:none">
      <thead><tr>
        <th style="width:56px"></th>
        <th>Palet</th>
        <th>Condiție</th>
        <th>Se termină</th>
        <th class="num">RRP</th>
        <th class="num">Preț est. vânzare</th>
        <th class="num">Bid recomandat</th>
        <th class="num">Bid curent</th>
        <th>Status</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
const fmt = new Intl.NumberFormat('ro-RO', { maximumFractionDigits: 0 });
const money = v => v == null ? '<span class="muted">—</span>' : fmt.format(v) + ' lei';

function endLabel(iso) {
  if (!iso) return '<span class="muted">—</span>';
  const end = new Date(iso), now = new Date();
  const mins = Math.round((end - now) / 60000);
  let rel;
  if (mins < 0) rel = 'încheiat';
  else if (mins < 60) rel = `în ${mins}m`;
  else if (mins < 1440) rel = `în ${Math.floor(mins/60)}h ${mins%60}m`;
  else rel = `în ${Math.floor(mins/1440)}z`;
  const t = end.toLocaleString('ro-RO', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  return `${t} <span class="muted">(${rel})</span>`;
}

function bidClass(p) {
  if (p.recommended_bid == null || !p.current_bid) return 'gray';
  if (p.current_bid < p.recommended_bid) return 'green';
  if (p.current_bid <= p.recommended_bid * 1.10) return 'yellow';
  return 'red';
}

function conditionTag(c) {
  if (!c) return '';
  const lower = c.toLowerCase();
  if (lower.includes('brand new') || lower === 'new') return `<span class="tag tag-green">${c}</span>`;
  if (lower.includes('customer return') || lower.includes('return')) return `<span class="tag tag-yellow">${c}</span>`;
  return `<span class="tag tag-gray">${c}</span>`;
}

// Returns YYYY-MM-DD in Bucharest time for an ISO UTC string.
function ymd(iso) {
  return iso ? new Date(iso).toLocaleDateString('sv-SE', { timeZone: 'Europe/Bucharest' }) : '';
}

const pendingSKUs = new Set();
let activeTab = 'tomorrow';

function setTab(tab) {
  activeTab = tab;
  document.getElementById('tab-tomorrow').classList.toggle('active', tab === 'tomorrow');
  document.getElementById('tab-today').classList.toggle('active', tab === 'today');
  render(lastPallets);
}

function stepText(p) {
  if (pendingSKUs.has(p.sku) && !p.estimate_status) return 'Se pornește…';
  if (!p.items_count) return 'Se descarcă manifestul…';
  if (!p.resolved_count) return 'Se caută prețuri…';
  if (p.resolved_count < p.items_count) return `Se procesează produsele (${p.resolved_count}/${p.items_count})…`;
  return 'Se finalizează…';
}

function statusCell(p) {
  const loading = p.estimate_status === 'in_progress' || (pendingSKUs.has(p.sku) && !p.estimate_status);
  if (loading) {
    return `<span class="step-tag"><span class="spinner"></span>${stepText(p)}</span>`;
  }
  let pill;
  const count = p.items_count ? ` <span class="muted" style="font-size:11px">${p.priced_count||0}/${p.items_count}</span>` : '';
  switch (p.estimate_status) {
    case 'done':    pill = '<span class="tag tag-green">complet</span>' + count; break;
    case 'partial': pill = '<span class="tag tag-yellow">parțial</span>' + count; break;
    case 'error': {
      const tip = p.error_message ? ` data-tip="${p.error_message.replace(/"/g,'&quot;')}"` : '';
      pill = `<span class="tag tag-red" style="cursor:help"${tip}>eroare ⓘ</span>`;
      break;
    }
    default: pill = '<span class="tag tag-gray">neestimat</span>'; break;
  }
  const canEstimate = !p.estimate_status || p.estimate_status === 'error' || p.estimate_status === 'partial';
  const label = (p.estimate_status === 'partial' || p.estimate_status === 'error') ? 'Reestimează' : 'Estimează';
  const btn = canEstimate
    ? `<button class="btn-est" onclick="estimateOne('${p.sku}')">${label}</button>`
    : '';
  return pill + btn;
}

function imgCell(p) {
  if (p.image) {
    return `<img class="pallet-img" src="${p.image}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'img-placeholder\\'>📦</div>'">`;
  }
  return '<div class="img-placeholder">📦</div>';
}

let lastPallets = [];

function render(pallets) {
  lastPallets = pallets;
  // remove from pendingSKUs once backend confirms any status (optimistic update in estimateOne handles the gap)
  pallets.forEach(p => { if (p.estimate_status) pendingSKUs.delete(p.sku); });
  if (!pallets.some(p => p.estimate_status === 'in_progress') && pendingSKUs.size === 0) fastUntil = 0;

  const todayYMD    = new Date().toLocaleDateString('sv-SE', { timeZone: 'Europe/Bucharest' });
  const tomorrowYMD = new Date(Date.now() + 86400000).toLocaleDateString('sv-SE', { timeZone: 'Europe/Bucharest' });
  const todayList    = pallets.filter(p => ymd(p.end_at) === todayYMD);
  const tomorrowList = pallets.filter(p => ymd(p.end_at) === tomorrowYMD);

  document.getElementById('tab-tomorrow').textContent = `Licitații de mâine (${tomorrowList.length})`;
  document.getElementById('tab-today').textContent    = `Licitații de azi (${todayList.length})`;

  const shown = activeTab === 'today' ? todayList : tomorrowList;

  const estimated  = shown.filter(p => p.estimate_status === 'done' || p.estimate_status === 'partial').length;
  const inProgress = shown.filter(p => p.estimate_status === 'in_progress').length;
  let summary = `${shown.length} paleți`;
  if (estimated)  summary += ` · ${estimated} estimați`;
  if (inProgress) summary += ` · ${inProgress} în curs`;
  summary += ` · actualizat ${new Date().toLocaleTimeString('ro-RO')}`;
  document.getElementById('summary').textContent = summary;
  syncHeadHeight();

  document.getElementById('empty').style.display = shown.length === 0 ? 'block' : 'none';
  document.getElementById('tbl').style.display   = shown.length ? 'table' : 'none';

  document.getElementById('rows').innerHTML = shown.map(p => {
    const c = bidClass(p);
    const win = p.current_bid ? (p.winning
      ? '<span class="tag tag-green" style="margin-left:4px">câștigăm</span>'
      : '<span class="tag tag-red" style="margin-left:4px">pierdem</span>') : '';
    return `<tr class="row-${c}">
      <td class="img-cell">${imgCell(p)}</td>
      <td class="title-cell">
        <div class="pallet-title"><a href="${p.auction_url||'#'}" target="_blank" style="color:inherit;text-decoration:none;">${p.title || p.sku}</a></div>
        <div class="pallet-sku">${p.sku}</div>
      </td>
      <td>${conditionTag(p.condition)}</td>
      <td>${endLabel(p.end_at)}</td>
      <td class="num">${money(p.rrp)}</td>
      <td class="num">${money(p.estimated_sale_price)}</td>
      <td class="num ${p.recommended_bid ? 'bid-'+c : ''}">${money(p.recommended_bid)}</td>
      <td class="num"><span class="bid-${c}">${money(p.current_bid)}</span>${win}</td>
      <td>${statusCell(p)}</td>
    </tr>`;
  }).join('');
}

async function load() {
  try {
    const r = await fetch('/api/pallets');
    render(await r.json());
  } catch (e) { console.error(e); }
}

async function estimateOne(sku) {
  pendingSKUs.add(sku);
  // Optimistic: clear local status so spinner shows immediately (render cleanup removes from
  // pendingSKUs on any truthy status, so we need status='' to keep it there until next poll).
  const optimistic = lastPallets.map(p => p.sku === sku ? {...p, estimate_status: '', error_message: ''} : p);
  render(optimistic);
  await fetch(`/api/estimate/${encodeURIComponent(sku)}`, { method: 'POST' });
  fastPoll();
}

async function estimate() {
  const btn = document.getElementById('estimate-btn');
  btn.disabled = true; btn.textContent = 'Se estimează…';
  // Only tomorrow's unestimated pallets — matches the backend (estimableSKUs).
  const tomorrowYMD = new Date(Date.now() + 86400000).toLocaleDateString('sv-SE', { timeZone: 'Europe/Bucharest' });
  const toEstimate = new Set(
    lastPallets.filter(p => ymd(p.end_at) === tomorrowYMD && (!p.estimate_status || p.estimate_status === 'error')).map(p => p.sku)
  );
  toEstimate.forEach(sku => pendingSKUs.add(sku));
  const optimistic = lastPallets.map(p => toEstimate.has(p.sku) ? {...p, estimate_status: '', error_message: ''} : p);
  render(optimistic);
  try { await fetch('/api/estimate', { method: 'POST' }); } catch (e) { console.error(e); }
  fastPoll();
  setTimeout(() => { btn.disabled = false; btn.textContent = 'Estimează paleții de mâine'; }, 4000);
}

async function refresh() {
  await fetch('/api/refresh', { method: 'POST' });
  setTimeout(load, 2000);
}

let fastUntil = 0;
function fastPoll() { fastUntil = Date.now() + 180000; }
function tick() {
  load();
  setTimeout(tick, Date.now() < fastUntil ? 4000 : 30000);
}

// Pin the column-header row flush under the real header (height varies with
// viewport/zoom/wrap), so the two sticky bars never overlap.
function syncHeadHeight() {
  const h = document.querySelector('header').offsetHeight;
  document.documentElement.style.setProperty('--head-h', h + 'px');
}
syncHeadHeight();
addEventListener('resize', syncHeadHeight);

const tip = document.getElementById('tip');
document.addEventListener('mouseover', e => {
  const el = e.target.closest('[data-tip]');
  if (el) { tip.textContent = el.dataset.tip; tip.style.display = 'block'; }
  else tip.style.display = 'none';
});
document.addEventListener('mousemove', e => {
  if (tip.style.display !== 'block') return;
  const x = Math.min(e.clientX + 14, window.innerWidth  - tip.offsetWidth  - 8);
  const y = Math.min(e.clientY + 14, window.innerHeight - tip.offsetHeight - 8);
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
});

load();
tick();
</script>
</body>
</html>
